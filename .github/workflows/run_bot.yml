name: AI YouTube Bot Runner

on:
  schedule:
    # 9, 12, 3, 6, 9, 11 (IST) -> 3:30, 6:30, 9:30, 12:30, 15:30, 17:30 UTC
    - cron: '30 3,6,9,12,15,17 * * *'
  workflow_dispatch:
    inputs:
      shorts_only:
        description: 'Run only for Shorts'
        required: false
        default: false
        type: boolean
      topic:
        description: 'Custom topic (leave empty for research)'
        required: false
        default: ''

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Remotion dependencies
        working-directory: ./remotion_app
        run: npm ci

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_SEARCH_ENGINE_ID }}
          PLAYHT_USER_ID: ${{ secrets.PLAYHT_USER_ID }}
          PLAYHT_API_KEY: ${{ secrets.PLAYHT_API_KEY }}
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          mkdir -p config
          echo "$YOUTUBE_TOKEN_JSON" > config/token.json
          
          # Logic to decide if it's a Long or Shorts-only run based on UTC hour
          # Hours for Long (IST 9, 15, 21): 3, 9, 15 UTC
          HOUR=$(date +%H)
          FLAGS=""
          
          # If manual run, check inputs
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.shorts_only }}" == "true" ]; then
              FLAGS="--shorts-only"
            fi
            if [ -n "${{ github.event.inputs.topic }}" ]; then
              FLAGS="$FLAGS --topic \"${{ github.event.inputs.topic }}\""
            fi
          else
            # Automated run: check if it's one of the "Shorts Only" intervals (6, 12, 17 UTC)
            if [[ "$HOUR" == "06" || "$HOUR" == "12" || "$HOUR" == "17" ]]; then
              FLAGS="--shorts-only"
            fi
          fi
          
          echo "Running with flags: $FLAGS"
          python main.py $FLAGS

      - name: Upload Logs/Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-output
          path: output/

      - name: Commit and Push changes
        if: success()
        run: |
          git config --global user.name "AI YouTube Bot"
          git config --global user.email "bot@youtube-ai.com"
          git add output/topic_history.json
          git commit -m "Auto-update topic history [skip ci]" || echo "No changes to commit"
          git push origin main
